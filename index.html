<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Liga de Líderes · CCL 2026 — Región Quial</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        font-style: normal;
        font-weight: 400;
        src: url('/ui/fonts/PressStart2P.ttf') format('truetype');
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #101018;
        height: 100%;
      }
      #juego {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      /* Wrapper del tamaño exacto del canvas: referencia de posición para el
         overlay DOM de Phaser (input de nombre) y, en Fase 6, para el marco
         de consola GBA. */
      #consola {
        position: relative;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="juego"><div id="consola"></div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Liga de Líderes · CCL 2026 — Región Quial</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        font-style: normal;
        font-weight: 400;
        src: url('/ui/fonts/PressStart2P.ttf') format('truetype');
      }
      /* Wrapper del tamaño exacto del canvas: referencia de posición para el
         overlay DOM de Phaser (input de nombre). */
      #consola {
        position: relative;
        line-height: 0;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <!-- Marco Game Boy Color portado 1:1 de chase-mew/pokemon-js
         (src/components/Gameboy.tsx). Los data-tecla los cablea src/marcoGba.js. -->
    <div class="gameboy" id="GameBoy">
      <div class="display-section">
        <div class="screen-area">
          <div class="power">
            <div class="indicator">
              <div class="led"></div>
              <span class="arc" style="z-index: 2"></span>
              <span class="arc" style="z-index: 1"></span>
              <span class="arc" style="z-index: 0"></span>
            </div>
            POWER
          </div>

          <div class="display"><div id="consola"></div></div>

          <div class="label">
            <div class="title">GAME BOY</div>
            <div class="subtitle">
              <span class="c">C</span>
              <span class="o1">O</span>
              <span class="l">L</span>
              <span class="o2">O</span>
              <span class="r">R</span>
            </div>
          </div>
        </div>

        <div class="nintendo">Nintendo</div>
      </div>
      <div class="control-section">
        <div class="controls">
          <div class="dpad">
            <div class="up" data-tecla="ArrowUp"><i>▲</i></div>
            <div class="right" data-tecla="ArrowRight"><i>▶</i></div>
            <div class="down" data-tecla="ArrowDown"><i>▼</i></div>
            <div class="left" data-tecla="ArrowLeft"><i>◀</i></div>
            <div class="middle"></div>
          </div>
          <div class="a-b">
            <div class="b" data-tecla="KeyX">B</div>
            <div class="a" data-tecla="KeyZ">A</div>
          </div>
        </div>

        <div class="start-select">
          <div class="select" data-tecla="Escape">SELECT</div>
          <div class="start" data-tecla="Enter">START</div>
        </div>
      </div>

      <div class="speaker">
        <div class="dot placeholder"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot placeholder"></div>

        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>

        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>

        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>

        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>

        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>

        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>

        <div class="dot placeholder"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot closed"></div>
        <div class="dot open"></div>
        <div class="dot placeholder"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
